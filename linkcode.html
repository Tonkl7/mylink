<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarayut Angko</title>
    
    <!-- นำเข้า Tailwind CSS สำหรับการจัดเลย์เอาต์และตกแต่งแบบมินิมัล -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า FontAwesome สำหรับไอคอนแอปต่างๆ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- นำเข้า Google Fonts (Prompt) เพื่อให้ฟอนต์ไทยและอังกฤษดูสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* ธีมธรรมชาตินิดๆ (Subtle Nature) สีพื้นหลังไล่ระดับโทนเขียวอ่อน/เทาอ่อน */
            background: linear-gradient(135deg, #f0fdf4 0%, #e2e8f0 100%);
            background-attachment: fixed;
        }
        
        /* สร้างสีไล่ระดับแบบ Instagram */
        .bg-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        /* ปรับปรุง Animation ให้ทำงานกับทุกองค์ประกอบได้อย่างสมูท */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            /* ใช้ both เพื่อให้ opacity เป็น 0 ตั้งแต่ก่อนเริ่มอนิเมชัน */
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-6 px-4 sm:py-12 sm:px-6 selection:bg-emerald-200">

    <!-- Container หลัก (ปรับ Padding มือถือเป็น p-6 ให้พอดีจอ และขยายเป็น p-10 ในจอใหญ่) -->
    <main class="w-full max-w-[480px] bg-white/85 backdrop-blur-md rounded-[2.5rem] shadow-2xl shadow-emerald-900/10 p-6 sm:p-10 border border-white/60 animate-fade-in-up">
        
        <!-- ส่วนหัว (Header: โลโก้ + ชื่อ + ซับไตเติ้ล) -->
        <header class="text-center mb-8 sm:mb-10 flex flex-col items-center animate-fade-in-up" style="animation-delay: 0.1s;">
            
            <!-- ส่วนของรูปโปรไฟล์ (เปลี่ยน URL รูปใน src="...") -->
            <div class="w-32 h-32 rounded-full shadow-lg shadow-emerald-100 border-[6px] border-white mb-5 relative overflow-hidden bg-slate-50 flex items-center justify-center">
                <!-- นำลิงก์รูปภาพของคุณมาใส่ที่ src ด้านล่างนี้ -->
                <img src="https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/6af343ca-a739-421f-8b50-3303dd7be6d3.jpg" alt="Profile Picture" class="w-full h-full object-cover">
            </div>

            <!-- Title -->
            <h1 class="text-2xl font-semibold text-slate-800 flex items-center justify-center gap-2">
                <i class="fa-solid fa-leaf text-emerald-500 text-xl"></i> Tonkla
            </h1>
            
            <!-- Subtitle -->
            <p class="text-sm text-slate-500 mt-1.5 font-light tracking-wide">
                Sarayut Angko
            </p>
        </header>

        <!-- ส่วนของปุ่มลิงก์ต่างๆ -->
        <!-- วิธีใส่ลิงก์: เปลี่ยนเครื่องหมาย # ใน href="#" เป็น URL ที่คุณต้องการ -->
        <nav class="space-y-4 sm:space-y-5">
            
            <!-- 1. Facebook -->
            <a href="https://www.facebook.com/Txnklz" target="_blank" rel="noopener noreferrer" 
               class="group flex items-center w-full px-5 py-4 rounded-2xl bg-[#1877F2] text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/30 transition-all duration-300 animate-fade-in-up" style="animation-delay: 0.2s;">
                <i class="fa-brands fa-facebook text-2xl w-8 text-center group-hover:scale-110 transition-transform"></i>
                <span class="flex-1 text-center font-medium pr-8">Facebook</span>
            </a>

            <!-- 2. Instagram -->
            <a href="https://www.instagram.com/kla.vnta?igsh=MXA4NDB6cnZlcDYzbA==" target="_blank" rel="noopener noreferrer" 
               class="group flex items-center w-full px-5 py-4 rounded-2xl bg-instagram text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-pink-500/30 transition-all duration-300 animate-fade-in-up" style="animation-delay: 0.3s;">
                <i class="fa-brands fa-instagram text-2xl w-8 text-center group-hover:scale-110 transition-transform"></i>
                <span class="flex-1 text-center font-medium pr-8">Instagram</span>
            </a>

            <!-- 3. GitHub -->
            <a href="https://github.com/Tonkl7" target="_blank" rel="noopener noreferrer" 
               class="group flex items-center w-full px-5 py-4 rounded-2xl bg-[#24292e] text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-slate-800/30 transition-all duration-300 animate-fade-in-up" style="animation-delay: 0.4s;">
                <i class="fa-brands fa-github text-2xl w-8 text-center group-hover:scale-110 transition-transform"></i>
                <span class="flex-1 text-center font-medium pr-8">GitHub</span>
            </a>

            <!-- 4. Docker Hub -->
            <a href="https://hub.docker.com/u/sarayuttk" target="_blank" rel="noopener noreferrer" 
               class="group flex items-center w-full px-5 py-4 rounded-2xl bg-[#1D63ED] text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-blue-500/30 transition-all duration-300 animate-fade-in-up" style="animation-delay: 0.5s;">
                <i class="fa-brands fa-docker text-2xl w-8 text-center group-hover:scale-110 transition-transform"></i>
                <span class="flex-1 text-center font-medium pr-8">Docker Hub</span>
            </a>

            <!-- เส้นคั่น: เพิ่มเติม -->
            <div class="flex items-center justify-center py-1 animate-fade-in-up" style="animation-delay: 0.6s;">
                <div class="h-px bg-slate-300/60 flex-1"></div>
                <span class="px-4 text-xs font-light text-slate-400 tracking-wider">เพิ่มเติม</span>
                <div class="h-px bg-slate-300/60 flex-1"></div>
            </div>

            <!-- 5. Tonkla's Hub -->
            <a href="https://tonkl7.github.io/mywebportals/mycode/webhubV3-Series/webhubV_32p20g1.html" target="_blank" rel="noopener noreferrer" 
               class="group flex items-center w-full px-5 py-4 rounded-2xl bg-emerald-500 text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-emerald-500/30 transition-all duration-300 animate-fade-in-up" style="animation-delay: 0.7s;">
                <i class="fa-solid fa-seedling text-xl w-8 text-center group-hover:scale-110 transition-transform"></i>
                <span class="flex-1 text-center font-medium pr-8">Tonkla's Hub</span>
            </a>

            <!-- 6. Portfolio -->
            <a href="#" target="_blank" rel="noopener noreferrer" 
               class="group flex items-center w-full px-5 py-4 rounded-2xl bg-slate-800 text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-slate-800/30 transition-all duration-300 animate-fade-in-up" style="animation-delay: 0.8s;">
                <i class="fa-solid fa-briefcase text-xl w-8 text-center group-hover:scale-110 transition-transform"></i>
                <span class="flex-1 text-center font-medium pr-8">Portfolio (upcoming...)</span>
            </a>

        </nav>

        <!-- Footer เล็กๆ (สามารถเอาออกได้ถ้าไม่ต้องการ) -->
        <footer class="mt-8 sm:mt-10 text-center animate-fade-in-up" style="animation-delay: 0.9s;">
            <p class="text-xs text-slate-400">&copy; 2026 Tonkla. All rights reserved.</p>
        </footer>

    </main>

</body>
</html>
